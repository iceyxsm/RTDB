syntax = "proto3";

package cluster;

// Cluster service for inter-node communication
service ClusterService {
    // Node joins cluster
    rpc JoinCluster(JoinRequest) returns (JoinResponse);
    
    // Node leaves cluster
    rpc LeaveCluster(LeaveRequest) returns (LeaveResponse);
    
    // Get cluster topology
    rpc GetTopology(TopologyRequest) returns (TopologyResponse);
    
    // Heartbeat for health checks
    rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
    
    // Forward vector search request
    rpc Search(SearchRequest) returns (SearchResponse);
    
    // Forward vector insert
    rpc Insert(InsertRequest) returns (InsertResponse);
    
    // Replicate data to follower
    rpc Replicate(ReplicateRequest) returns (ReplicateResponse);
}

// Join cluster request
message JoinRequest {
    string node_id = 1;
    string address = 2;
    uint64 capacity = 3;
}

message JoinResponse {
    bool success = 1;
    string error = 2;
    Topology topology = 3;
}

// Leave cluster request
message LeaveRequest {
    string node_id = 1;
}

message LeaveResponse {
    bool success = 1;
}

// Get topology request
message TopologyRequest {}

message TopologyResponse {
    Topology topology = 1;
}

// Topology information
message Topology {
    uint64 version = 1;
    repeated Node nodes = 2;
    repeated ShardMapping shard_mapping = 3;
}

message Node {
    string id = 1;
    string address = 2;
    NodeStatus status = 3;
    uint64 capacity = 4;
    uint64 load = 5;
    repeated uint32 shards = 6;
}

enum NodeStatus {
    JOINING = 0;
    ACTIVE = 1;
    SUSPECT = 2;
    OFFLINE = 3;
}

message ShardMapping {
    uint32 shard_id = 1;
    string primary_node = 2;
    repeated string replica_nodes = 3;
}

// Heartbeat
message HeartbeatRequest {
    string node_id = 1;
    uint64 timestamp = 2;
    uint64 load = 3;
}

message HeartbeatResponse {
    bool acknowledged = 1;
    uint64 server_timestamp = 2;
}

// Search request
message SearchRequest {
    string collection = 1;
    repeated float vector = 2;
    uint32 top_k = 3;
    float score_threshold = 4;
}

message SearchResponse {
    repeated ScoredVector results = 1;
    string error = 2;
}

message ScoredVector {
    uint64 id = 1;
    float score = 2;
    bytes payload = 3;
}

// Insert request
message InsertRequest {
    string collection = 1;
    uint64 id = 2;
    repeated float vector = 3;
    bytes payload = 4;
}

message InsertResponse {
    bool success = 1;
    string error = 2;
}

// Replication request
message ReplicateRequest {
    string collection = 1;
    uint64 id = 2;
    repeated float vector = 3;
    bytes payload = 4;
    uint64 timestamp = 5;
}

message ReplicateResponse {
    bool success = 1;
    uint64 replicated_at = 2;
}

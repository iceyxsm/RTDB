version: '3.8'

services:
  rtdb:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: rtdb
    restart: unless-stopped
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # gRPC API
      - "9090:9090"  # Prometheus metrics
    volumes:
      - rtdb_data:/data
    environment:
      - RTDB_SERVER_REST_BIND=0.0.0.0:6333
      - RTDB_SERVER_GRPC_BIND=0.0.0.0:6334
      - RTDB_SERVER_METRICS_BIND=0.0.0.0:9090
      - RTDB_STORAGE_DATA_DIR=/data
      - RTDB_LOGGING_LEVEL=info
    healthcheck:
      test: ["CMD", "rtdb", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - rtdb_network

  # Optional: Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: rtdb_prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - rtdb_network
    depends_on:
      - rtdb

  # Optional: Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: rtdb_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./config/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - rtdb_network
    depends_on:
      - prometheus

volumes:
  rtdb_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  rtdb_network:
    driver: bridge

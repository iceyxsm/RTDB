apiVersion: v1
kind: Service
metadata:
  name: {{ include "rtdb.fullname" . }}
  labels:
    {{- include "rtdb.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.grpcPort }}
      targetPort: grpc
      protocol: TCP
      name: grpc
    - port: {{ .Values.service.restPort }}
      targetPort: rest
      protocol: TCP
      name: rest
    - port: {{ .Values.service.healthPort }}
      targetPort: health
      protocol: TCP
      name: health
    - port: {{ .Values.service.metricsPort }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "rtdb.selectorLabels" . | nindent 4 }}
---
{{- if .Values.rtdb.cluster.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rtdb.fullname" . }}-headless
  labels:
    {{- include "rtdb.labels" . | nindent 4 }}
    service.rtdb.io/type: headless
spec:
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - port: {{ .Values.service.grpcPort }}
      targetPort: grpc
      protocol: TCP
      name: grpc
    - port: {{ .Values.service.restPort }}
      targetPort: rest
      protocol: TCP
      name: rest
  selector:
    {{- include "rtdb.selectorLabels" . | nindent 4 }}
{{- end }}
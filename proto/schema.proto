syntax = "proto3";

package milvus.proto.schema;

option go_package = "github.com/milvus-io/milvus-proto/go-api/v2/schemapb";

import "proto/common.proto";

// Collection schema definition
message CollectionSchema {
    string name = 1;
    string description = 2;
    bool autoID = 3;
    repeated FieldSchema fields = 4;
    bool enable_dynamic_field = 5;
    repeated common.KeyValuePair properties = 6;
}

// Field schema definition
message FieldSchema {
    int64 fieldID = 1;
    string name = 2;
    bool is_primary_key = 3;
    string description = 4;
    DataType data_type = 5;
    repeated TypeParam type_params = 6;
    repeated common.KeyValuePair index_params = 7;
    bool autoID = 8;
    FieldState state = 9;
    int64 element_type = 10;
    string default_value = 11;
    bool is_dynamic = 12;
    bool is_partition_key = 13;
    bool is_clustering_key = 14;
    bool nullable = 15;
}

// Data types supported by Milvus
enum DataType {
    None = 0;
    Bool = 1;
    Int8 = 2;
    Int16 = 3;
    Int32 = 4;
    Int64 = 5;
    Float = 10;
    Double = 11;
    String = 20;
    VarChar = 21;
    Array = 22;
    JSON = 23;
    BinaryVector = 100;
    FloatVector = 101;
    Float16Vector = 102;
    BFloat16Vector = 103;
    SparseFloatVector = 104;
}

// Field state
enum FieldState {
    FieldCreated = 0;
    FieldCreating = 1;
    FieldDropping = 2;
    FieldDropped = 3;
}

// Type parameters for fields
message TypeParam {
    string key = 1;
    string value = 2;
}

// Field data for insert/query operations
message FieldData {
    DataType type = 1;
    string field_name = 2;
    oneof field {
        ScalarField scalars = 3;
        VectorField vectors = 4;
    }
    int64 field_id = 5;
    bool is_dynamic = 6;
}

// Scalar field data
message ScalarField {
    oneof data {
        BoolArray bool_data = 1;
        IntArray int_data = 2;
        LongArray long_data = 3;
        FloatArray float_data = 4;
        DoubleArray double_data = 5;
        StringArray string_data = 6;
        BytesArray bytes_data = 7;
        ArrayArray array_data = 8;
        JSONArray json_data = 9;
    }
}

// Vector field data
message VectorField {
    int64 dim = 1;
    oneof data {
        FloatArray float_vector = 2;
        bytes binary_vector = 3;
        bytes float16_vector = 4;
        bytes bfloat16_vector = 5;
        SparseFloatArray sparse_float_vector = 6;
    }
}

// Array types for different data types
message BoolArray {
    repeated bool data = 1;
}

message IntArray {
    repeated int32 data = 1;
}

message LongArray {
    repeated int64 data = 1;
}

message FloatArray {
    repeated float data = 1;
}

message DoubleArray {
    repeated double data = 1;
}

message StringArray {
    repeated string data = 1;
}

message BytesArray {
    repeated bytes data = 1;
}

message ArrayArray {
    repeated ScalarField data = 1;
    DataType element_type = 2;
}

message JSONArray {
    repeated bytes data = 1;
}

message SparseFloatArray {
    repeated SparseFloatRow contents = 1;
}

message SparseFloatRow {
    repeated uint32 indices = 1;
    repeated float values = 2;
}

// IDs for entities
message IDs {
    oneof id_field {
        LongArray int_id = 1;
        StringArray str_id = 2;
    }
}

// Search result data
message SearchResultData {
    int64 num_queries = 1;
    int64 top_k = 2;
    repeated FieldData fields_data = 3;
    repeated float scores = 4;
    IDs ids = 5;
    repeated int64 topks = 6;
    string output_fields = 7;
}

// Vector field statistics
message VectorFieldStats {
    int64 field_id = 1;
    repeated int64 min_pk = 2;
    repeated int64 max_pk = 3;
}

// Field statistics
message FieldStats {
    int64 field_id = 1;
    int64 rows_count = 2;
}

// Collection statistics
message CollectionStats {
    int64 row_count = 1;
}
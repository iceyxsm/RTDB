syntax = "proto3";

package milvus.proto.milvus;

option go_package = "github.com/milvus-io/milvus-proto/go-api/v2/milvuspb";

import "proto/common.proto";
import "proto/schema.proto";

// Milvus service definition
service MilvusService {
    // Collection operations
    rpc CreateCollection(CreateCollectionRequest) returns (common.Status) {}
    rpc DropCollection(DropCollectionRequest) returns (common.Status) {}
    rpc HasCollection(HasCollectionRequest) returns (BoolResponse) {}
    rpc LoadCollection(LoadCollectionRequest) returns (common.Status) {}
    rpc ReleaseCollection(ReleaseCollectionRequest) returns (common.Status) {}
    rpc DescribeCollection(DescribeCollectionRequest) returns (DescribeCollectionResponse) {}
    rpc GetCollectionStatistics(GetCollectionStatisticsRequest) returns (GetCollectionStatisticsResponse) {}
    rpc ShowCollections(ShowCollectionsRequest) returns (ShowCollectionsResponse) {}
    
    // Data operations
    rpc Insert(InsertRequest) returns (MutationResult) {}
    rpc Delete(DeleteRequest) returns (MutationResult) {}
    rpc Search(SearchRequest) returns (SearchResults) {}
    rpc Flush(FlushRequest) returns (FlushResponse) {}
    rpc Query(QueryRequest) returns (QueryResults) {}
    
    // Index operations
    rpc CreateIndex(CreateIndexRequest) returns (common.Status) {}
    rpc DescribeIndex(DescribeIndexRequest) returns (DescribeIndexResponse) {}
    rpc DropIndex(DropIndexRequest) returns (common.Status) {}
    
    // Partition operations
    rpc CreatePartition(CreatePartitionRequest) returns (common.Status) {}
    rpc DropPartition(DropPartitionRequest) returns (common.Status) {}
    rpc HasPartition(HasPartitionRequest) returns (BoolResponse) {}
    rpc LoadPartitions(LoadPartitionsRequest) returns (common.Status) {}
    rpc ReleasePartitions(ReleasePartitionsRequest) returns (common.Status) {}
    rpc ShowPartitions(ShowPartitionsRequest) returns (ShowPartitionsResponse) {}
}

// Collection requests
message CreateCollectionRequest {
    common.MsgBase base = 1;
    string db_name = 2;
    string collection_name = 3;
    bytes schema = 4;
    int32 shards_num = 5;
    repeated common.KeyValuePair properties = 6;
    int64 consistency_level = 7;
}

message DropCollectionRequest {
    common.MsgBase base = 1;
    string db_name = 2;
    string collection_name = 3;
}

message HasCollectionRequest {
    common.MsgBase base = 1;
    string db_name = 2;
    string collection_name = 3;
    uint64 time_stamp = 4;
}

message BoolResponse {
    common.Status status = 1;
    bool value = 2;
}

message LoadCollectionRequest {
    common.MsgBase base = 1;
    string db_name = 2;
    string collection_name = 3;
    repeated string replica_number = 4;
    repeated common.KeyValuePair properties = 5;
}

message ReleaseCollectionRequest {
    common.MsgBase base = 1;
    string db_name = 2;
    string collection_name = 3;
}

message DescribeCollectionRequest {
    common.MsgBase base = 1;
    string db_name = 2;
    string collection_name = 3;
    int64 collectionID = 4;
    uint64 time_stamp = 5;
}

message DescribeCollectionResponse {
    common.Status status = 1;
    schema.CollectionSchema schema = 2;
    int64 collectionID = 3;
    repeated string virtual_channel_names = 4;
    repeated string physical_channel_names = 5;
    uint64 created_timestamp = 6;
    uint64 created_utc_timestamp = 7;
    int32 shards_num = 8;
    repeated string aliases = 9;
    repeated common.KeyValuePair properties = 10;
    int64 db_id = 11;
    int64 consistency_level = 12;
}

message GetCollectionStatisticsRequest {
    common.MsgBase base = 1;
    string db_name = 2;
    string collection_name = 3;
}

message GetCollectionStatisticsResponse {
    common.Status status = 1;
    repeated common.KeyValuePair stats = 2;
}

message ShowCollectionsRequest {
    common.MsgBase base = 1;
    string db_name = 2;
    uint64 time_stamp = 3;
    ShowType type = 4;
    repeated string collection_names = 5;
}

message ShowCollectionsResponse {
    common.Status status = 1;
    repeated string collection_names = 2;
    repeated int64 collection_ids = 3;
    repeated uint64 created_timestamps = 4;
    repeated uint64 created_utc_timestamps = 5;
    repeated int64 inMemory_percentages = 6;
    repeated bool query_service_available = 7;
    repeated string db_name = 8;
}

// Data operation messages
message InsertRequest {
    common.MsgBase base = 1;
    string db_name = 2;
    string collection_name = 3;
    string partition_name = 4;
    repeated schema.FieldData fields_data = 5;
    repeated uint32 hash_keys = 6;
    int32 num_rows = 7;
}

message MutationResult {
    common.Status status = 1;
    schema.IDs IDs = 2;
    repeated uint32 succ_index = 3;
    repeated uint32 err_index = 4;
    bool acknowledged = 5;
    int64 insert_cnt = 6;
    int64 delete_cnt = 7;
    int64 upsert_cnt = 8;
    uint64 timestamp = 9;
}

message DeleteRequest {
    common.MsgBase base = 1;
    string db_name = 2;
    string collection_name = 3;
    string partition_name = 4;
    string expr = 5;
    repeated uint32 hash_keys = 6;
    int64 consistency_level = 7;
}

message SearchRequest {
    common.MsgBase base = 1;
    string db_name = 2;
    string collection_name = 3;
    repeated string partition_names = 4;
    string dsl = 5;
    bytes placeholder_group = 6;
    common.DslType dsl_type = 7;
    repeated string output_fields = 8;
    repeated common.KeyValuePair search_params = 9;
    uint64 travel_timestamp = 10;
    uint64 guarantee_timestamp = 11;
    int64 nq = 12;
    int64 consistency_level = 13;
    bool use_default_consistency = 14;
    int64 search_by_primary_keys = 15;
}

message SearchResults {
    common.Status status = 1;
    schema.SearchResultData results = 2;
    string collection_name = 3;
}

message FlushRequest {
    common.MsgBase base = 1;
    string db_name = 2;
    repeated string collection_names = 3;
}

message FlushResponse {
    common.Status status = 1;
    string db_name = 2;
    map<string, schema.LongArray> coll_segIDs = 3;
    map<string, schema.LongArray> flush_coll_segIDs = 4;
    map<string, uint64> coll_seal_times = 5;
    map<string, schema.LongArray> coll_flush_ts = 6;
    repeated string channel_cps = 7;
}

message QueryRequest {
    common.MsgBase base = 1;
    string db_name = 2;
    string collection_name = 3;
    string expr = 4;
    repeated string output_fields = 5;
    repeated string partition_names = 6;
    uint64 travel_timestamp = 7;
    uint64 guarantee_timestamp = 8;
    repeated common.KeyValuePair query_params = 9;
    int64 consistency_level = 10;
    bool use_default_consistency = 11;
}

message QueryResults {
    common.Status status = 1;
    repeated schema.FieldData fields_data = 2;
    string collection_name = 3;
}

// Index operations
message CreateIndexRequest {
    common.MsgBase base = 1;
    string db_name = 2;
    string collection_name = 3;
    string field_name = 4;
    repeated common.KeyValuePair extra_params = 5;
    string index_name = 6;
}

message DescribeIndexRequest {
    common.MsgBase base = 1;
    string db_name = 2;
    string collection_name = 3;
    string field_name = 4;
    string index_name = 5;
    uint64 timestamp = 6;
}

message DescribeIndexResponse {
    common.Status status = 1;
    repeated IndexDescription index_descriptions = 2;
}

message IndexDescription {
    string index_name = 1;
    int64 indexID = 2;
    repeated common.KeyValuePair params = 3;
    string field_name = 4;
    int64 indexed_rows = 5;
    int64 total_rows = 6;
    common.IndexState state = 7;
    string index_state_fail_reason = 8;
    bool is_auto_index = 9;
    repeated common.KeyValuePair user_index_params = 10;
}

message DropIndexRequest {
    common.MsgBase base = 1;
    string db_name = 2;
    string collection_name = 3;
    string field_name = 4;
    string index_name = 5;
}

// Partition operations
message CreatePartitionRequest {
    common.MsgBase base = 1;
    string db_name = 2;
    string collection_name = 3;
    string partition_name = 4;
}

message DropPartitionRequest {
    common.MsgBase base = 1;
    string db_name = 2;
    string collection_name = 3;
    string partition_name = 4;
}

message HasPartitionRequest {
    common.MsgBase base = 1;
    string db_name = 2;
    string collection_name = 3;
    string partition_name = 4;
}

message LoadPartitionsRequest {
    common.MsgBase base = 1;
    string db_name = 2;
    string collection_name = 3;
    repeated string partition_names = 4;
    int32 replica_number = 5;
    repeated common.KeyValuePair properties = 6;
}

message ReleasePartitionsRequest {
    common.MsgBase base = 1;
    string db_name = 2;
    string collection_name = 3;
    repeated string partition_names = 4;
}

message ShowPartitionsRequest {
    common.MsgBase base = 1;
    string db_name = 2;
    string collection_name = 3;
    int64 collectionID = 4;
    repeated string partition_names = 5;
    ShowType type = 6;
}

message ShowPartitionsResponse {
    common.Status status = 1;
    repeated string partition_names = 2;
    repeated int64 partitionIDs = 3;
    repeated uint64 created_timestamps = 4;
    repeated uint64 created_utc_timestamps = 5;
    repeated int64 inMemory_percentages = 6;
}

enum ShowType {
    All = 0;
    InMemory = 1;
}
syntax = "proto3";

package milvus.proto.common;

option go_package = "github.com/milvus-io/milvus-proto/go-api/v2/commonpb";

// Common status for all operations
message Status {
    ErrorCode error_code = 1;
    string reason = 2;
    int32 code = 3;
    bool retriable = 4;
    string detail = 5;
}

enum ErrorCode {
    Success = 0;
    UnexpectedError = 1;
    ConnectFailed = 2;
    PermissionDenied = 3;
    CollectionNotExists = 4;
    IllegalArgument = 5;
    IllegalDimension = 7;
    IllegalIndexType = 8;
    IllegalCollectionName = 9;
    IllegalTOPK = 10;
    IllegalRowRecord = 11;
    IllegalVectorID = 12;
    IllegalSearchResult = 13;
    FileNotFound = 14;
    MetaFailed = 15;
    CacheFailed = 16;
    CannotCreateFolder = 17;
    CannotCreateFile = 18;
    CannotDeleteFolder = 19;
    CannotDeleteFile = 20;
    BuildIndexError = 21;
    IllegalNLIST = 22;
    IllegalMetricType = 23;
    OutOfMemory = 24;
    IndexNotExist = 25;
    EmptyCollection = 26;
    UpdateImportTaskFailure = 27;
    CollectionNameNotFound = 28;
    CreateCredentialFailure = 29;
    UpdateCredentialFailure = 30;
    DeleteCredentialFailure = 31;
    GetCredentialFailure = 32;
    ListCredUsersFailure = 33;
    GetUserFailure = 34;
    CreateRoleFailure = 35;
    DropRoleFailure = 36;
    OperateUserRoleFailure = 37;
    SelectRoleFailure = 38;
    SelectUserFailure = 39;
    SelectResourceFailure = 40;
    OperatePrivilegeFailure = 41;
    SelectGrantFailure = 42;
    RefreshPolicyInfoCacheFailure = 43;
    ListPolicyFailure = 44;
    NotShardLeader = 45;
    NoReplicaAvailable = 46;
    SegmentNotFound = 47;
    ForceDeny = 48;
    RateLimit = 49;
    NodeIDNotMatch = 50;
    UpsertAutoIDTrue = 51;
    InsufficientMemoryToLoad = 52;
    MemoryQuotaExhausted = 53;
    DiskQuotaExhausted = 54;
    TimeTickLongDelay = 55;
    NotReadyServe = 56;
    NotReadyCoordActivating = 57;
    DataCoordNA = 58;
    DDRequestRace = 59;
}

// Message base for all requests
message MsgBase {
    MsgType msg_type = 1;
    int64 msgID = 2;
    uint64 timestamp = 3;
    int64 sourceID = 4;
    int64 targetID = 5;
    map<string, string> properties = 6;
}

enum MsgType {
    Undefined = 0;
    CreateCollection = 100;
    DropCollection = 101;
    HasCollection = 102;
    DescribeCollection = 103;
    ShowCollections = 104;
    GetSystemConfigs = 105;
    LoadCollection = 106;
    ReleaseCollection = 107;
    CreateAlias = 108;
    DropAlias = 109;
    AlterAlias = 110;
    AlterCollection = 111;
    CreatePartition = 200;
    DropPartition = 201;
    HasPartition = 202;
    DescribePartition = 203;
    ShowPartitions = 204;
    LoadPartitions = 205;
    ReleasePartitions = 206;
    CreateIndex = 300;
    DescribeIndex = 301;
    DropIndex = 302;
    GetIndexState = 303;
    GetIndexBuildProgress = 304;
    Insert = 400;
    Delete = 401;
    Flush = 402;
    ResendSegmentStats = 403;
    Upsert = 404;
    Search = 500;
    SearchResult = 501;
    GetIndexStatistics = 502;
    Query = 503;
    QueryResult = 504;
    RetrieveResult = 505;
    WatchDmChannels = 600;
    RemoveDmChannels = 601;
    WatchQueryChannels = 602;
    RemoveQueryChannels = 603;
    SealedSegmentsChangeInfo = 604;
    WatchDeltaChannels = 605;
    GetShardLeaders = 606;
    GetReplicas = 607;
    UnsubDmChannel = 608;
    GetDistribution = 609;
    SyncDistribution = 610;
    SegmentInfo = 700;
    SystemInfo = 701;
    GetRecoveryInfo = 702;
    GetSegmentState = 703;
    TimeTick = 1200;
    QueryNodeStats = 1201;
    LoadIndex = 1202;
    RequestID = 1203;
    RequestTSO = 1204;
    AllocateSegment = 1205;
    SegmentStatistics = 1206;
    SegmentFlushDone = 1207;
    DataNodeTt = 1208;
    Connect = 1300;
    ListDatabases = 1301;
    CreateDatabase = 1302;
    DropDatabase = 1303;
    CreateCredential = 1400;
    GetCredential = 1401;
    DeleteCredential = 1402;
    UpdateCredential = 1403;
    ListCredUsernames = 1404;
    CreateRole = 1500;
    DropRole = 1501;
    OperateUserRole = 1502;
    SelectRole = 1503;
    SelectUser = 1504;
    OperatePrivilege = 1505;
    SelectGrant = 1506;
    RefreshPolicyInfoCache = 1507;
    ListPolicy = 1508;
    CreateResourceGroup = 1600;
    DropResourceGroup = 1601;
    ListResourceGroups = 1602;
    DescribeResourceGroup = 1603;
    TransferNode = 1604;
    TransferReplica = 1605;
    GetLoadingProgress = 1700;
    GetLoadState = 1701;
    CreateAlias = 1800;
    DropAlias = 1801;
    AlterAlias = 1802;
    DescribeAlias = 1803;
    ListAliases = 1804;
}

// Key-value pair for parameters
message KeyValuePair {
    string key = 1;
    string value = 2;
}

// DSL type for search
enum DslType {
    Dsl = 0;
    BoolExprV1 = 1;
}

// Index state
enum IndexState {
    IndexStateNone = 0;
    Unissued = 1;
    InProgress = 2;
    Finished = 3;
    Failed = 4;
    Retry = 5;
}

// Consistency level
enum ConsistencyLevel {
    Strong = 0;
    Session = 1;
    Bounded = 2;
    Eventually = 3;
    Customized = 4;
}

// Import state
enum ImportState {
    ImportPending = 0;
    ImportFailed = 1;
    ImportStarted = 2;
    ImportPersisted = 5;
    ImportCompleted = 6;
    ImportFailedAndCleaned = 7;
}

// Compaction state
enum CompactionState {
    UndefiedState = 0;
    Executing = 1;
    Completed = 2;
}

// Segment state
enum SegmentState {
    SegmentStateNone = 0;
    NotExist = 1;
    Growing = 2;
    Sealed = 3;
    Flushed = 4;
    Flushing = 5;
    Dropped = 6;
    Importing = 7;
}

// Placeholder type
enum PlaceholderType {
    None = 0;
    BinaryVector = 100;
    FloatVector = 101;
    Float16Vector = 102;
    BFloat16Vector = 103;
    SparseFloatVector = 104;
}
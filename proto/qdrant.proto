syntax = "proto3";

package qdrant;

option go_package = "github.com/qdrant/go-client";

// Compatibility with Qdrant proto
service Qdrant {
  rpc HealthCheck (HealthCheckRequest) returns (HealthCheckReply);
}

message HealthCheckRequest {}

message HealthCheckReply {
  string title = 1;
  string version = 2;
}

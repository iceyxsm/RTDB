version: '3.8'

services:
  rtdb:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: rtdb
    restart: unless-stopped
    ports:
      - "6333:6333"  # REST API (Qdrant compatible)
      - "6334:6334"  # gRPC API (Qdrant compatible)
      - "9090:9090"  # Prometheus metrics
    volumes:
      - rtdb_data:/data
    environment:
      - RTDB_SERVER_REST_BIND=0.0.0.0:6333
      - RTDB_SERVER_GRPC_BIND=0.0.0.0:6334
      - RTDB_SERVER_METRICS_BIND=0.0.0.0:9090
      - RTDB_STORAGE_DATA_DIR=/data
      - RTDB_LOGGING_LEVEL=info
    healthcheck:
      test: ["CMD", "rtdb", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  rtdb_data:
    driver: local
